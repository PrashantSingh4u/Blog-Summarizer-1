<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Summary</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            padding:20px;
            max-width:600px;
            margin:0 auto;
            border: 1px solid #f3f3f3;
        }
        h1{
            color: black;

        }
        .form-group{
            margin-bottom:20px;
        }
        label{
            display:block;
            margin-bottom:5px;
            font-weight: bold;
        }
        input[type="text"]{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:4px;
        } 
        button{
            background-color: rgb(222, 255, 89);
        }
        #success-message{
            color: green;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Snap Summary</h1>

    <div class="form-group">
        <label for="api-key">Gemini API Key</label>
        <input type="text" id="api-key" placeholder="Enter Your Gemini API Key"/>

        <p>
            you can get an API key from <a href="https://aistudio.google.com/app/apikey" target="_blank">GOOGLE AI STUDIO</a>

        </p>
    </div>

    <button id="save-key">Save Settings</button>
    <p id="success-message">Settings saved successfully!</p>

    <script src="option.js"></script>
</body>
</html>
